name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # previous LTS (22), latest LTS (24), latest current release (26)
        node: [22, 24, 26]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # The lockfile is generated with npm 11; pin it so `npm ci` interprets
      # the dependency tree the same way and stays in sync.
      - name: Pin npm
        run: npm i -g npm@11

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
