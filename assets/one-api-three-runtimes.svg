<svg xmlns="http://www.w3.org/2000/svg" width="840" height="300" viewBox="0 0 840 300" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="One class-based API, three Vitest-compatible runtimes: Vitest, Bun, node:test">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f6fb"/>
    </linearGradient>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0d1117; }
        .card { fill: #161b22; stroke: #30363d; }
        .title { fill: #e6edf3; }
        .sub { fill: #8b949e; }
        .code { fill: #e6edf3; }
        .arrow { stroke: #6e7681; }
        .chip { fill: #1f6feb22; stroke: #388bfd; }
        .chipText { fill: #58a6ff; }
      }
    </style>
  </defs>

  <rect class="bg" width="840" height="300" fill="#ffffff" rx="16"/>

  <text class="title" x="40" y="56" font-size="30" font-weight="700" fill="#0d1117">vitest-auto-spy</text>
  <text class="sub" x="40" y="84" font-size="16" fill="#57606a">One class-based API. Every Vitest-compatible runtime.</text>

  <!-- source call -->
  <rect class="card" x="40" y="120" width="330" height="70" rx="12" fill="url(#card)" stroke="#d0d7de"/>
  <text class="code" x="62" y="153" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#0d1117">createSpyFromClass(</text>
  <text class="code" x="62" y="176" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#0d1117">&#160;&#160;UserService)</text>

  <!-- arrow -->
  <line class="arrow" x1="378" y1="155" x2="470" y2="155" stroke="#8c959f" stroke-width="2"/>
  <polygon points="470,150 482,155 470,160" fill="#8c959f"/>

  <!-- fully-typed spy -->
  <rect class="card" x="490" y="120" width="310" height="70" rx="12" fill="url(#card)" stroke="#d0d7de"/>
  <text class="title" x="512" y="150" font-size="16" font-weight="600" fill="#0d1117">Spy&lt;UserService&gt;</text>
  <text class="sub" x="512" y="174" font-size="13" fill="#57606a">typed methods + resolveWith / nextWith / calledWith</text>

  <!-- runtime chips -->
  <g>
    <rect class="chip" x="40" y="228" width="240" height="46" rx="23" fill="#ddf4ff" stroke="#54aeff"/>
    <text class="chipText" x="160" y="257" font-size="17" font-weight="600" text-anchor="middle" fill="#0969da">Vitest</text>

    <rect class="chip" x="300" y="228" width="240" height="46" rx="23" fill="#ddf4ff" stroke="#54aeff"/>
    <text class="chipText" x="420" y="257" font-size="17" font-weight="600" text-anchor="middle" fill="#0969da">Bun&#160;&#160;(bun:test)</text>

    <rect class="chip" x="560" y="228" width="240" height="46" rx="23" fill="#ddf4ff" stroke="#54aeff"/>
    <text class="chipText" x="680" y="257" font-size="17" font-weight="600" text-anchor="middle" fill="#0969da">node:test</text>
  </g>
</svg>
